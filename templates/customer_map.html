<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VENDtrack | Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 10px; }
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 20px; text-decoration: none; color: #2b2d42; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">← Dashboard</a>
        <span>Live Vendor Tracking</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on RNSIT
        const map = L.map('map').setView([12.903, 77.518], 15);

        // Load OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Draw the Geofence Rectangle
        const bounds = [[12.9010, 77.5160], [12.9050, 77.5210]];
        L.rectangle(bounds, {color: "#00a896", weight: 2, fillOpacity: 0.1}).addTo(map);

        let markers = {};

        async function updateMap() {
            const response = await fetch('/api/vendors');
            const vendors = await response.json();

            vendors.forEach(v => {
                const color = v.is_inside ? "green" : "red";
                if (markers[v.cart_id]) {
                    markers[v.cart_id].setLatLng([v.lat, v.lon]);
                    markers[v.cart_id].setStyle({fillColor: color});
                } else {
                    markers[v.cart_id] = L.circleMarker([v.lat, v.lon], {
                        radius: 8, fillColor: color, color: "#000", weight: 1, fillOpacity: 0.8
                    }).addTo(map).bindPopup(`ID: ${v.cart_id}`);
                }
            });
        }

        setInterval(updateMap, 3000); // Refresh every 3 seconds
        updateMap();
    </script>
</body>
</html>
