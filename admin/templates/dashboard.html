<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VENDtrack | Welcome</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { padding: 20px; border: 1px solid #ddd; border-radius: 10px; text-decoration: none; color: #333; transition: 0.3s; }
        .card:hover { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VENDtrack Portal</h1>
        <p>Please select your login type</p>
        <div class="grid">
            <a href="/map" class="card"><h3>Customer</h3><p>Find nearby food</p></a>
            <a href="#" class="card"><h3>Vendor</h3><p>Manage your cart</p></a>
            <a href="/admin" class="card" style="border-color: #ef4444;"><h3>Admin</h3><p>Command Centre</p></a>
        </div>
    </div>
</body>
</html>
